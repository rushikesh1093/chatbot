services:
  - type: web
    name: agrofarm-backend
    env: python
    plan: free
    region: oregon
    branch: main
    rootDir: OneDrive/Desktop/chatbotfram
    buildCommand: pip install -r requirements.txt
    startCommand: cd Backend && uvicorn main:app --host 0.0.0.0 --port 
    envVars:
      - key: PYTHONUNBUFFERED
        value: 1
